name: Auto Detect and Unzip

on:
  push:
    paths:
      - '**/*.zip'
  workflow_dispatch:

jobs:
  extract_and_push:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Auto Detect and Unzip
        run: |
          # 1. Puri repository mein zip files dhundna (sirf .github folder ko chor kar)
          # 'find' command auto-detect karegi
          ZIP_FILES=$(find . -name "*.zip" -not -path "./.github/*")

          if [ -z "$ZIP_FILES" ]; then
            echo "Koi zip file nahi mili."
            exit 0
          fi

          for zip in $ZIP_FILES; do
            echo "Processing $zip..."
            
            # Temporary folder banana
            mkdir -p temp_extract
            unzip -o "$zip" -d temp_extract
            
            # 2. Zip ke andar wale contents ko handle karna
            cd temp_extract
            
            # Check karna ke kya zip ke andar sirf ek hi folder hai?
            # Agar sirf ek folder hai toh uske andar ka maal bahar nikalna
            ITEM_COUNT=$(ls -1 | wc -l)
            FIRST_ITEM=$(ls -1)

            if [ "$ITEM_COUNT" -eq 1 ] && [ -d "$FIRST_ITEM" ]; then
              echo "Folder ke andar se files nikali ja rahi hain..."
              cp -r "$FIRST_ITEM"/* ../
            else
              echo "Direct files copy ho rahi hain..."
              cp -r ./* ../
            fi
            
            cd ..
            rm -rf temp_extract
            
            # 3. (Optional) Purani zip delete karna taake dubara loop na chale
            # rm "$zip"
          done

      - name: Commit and Push Changes
        run: |
          git add .
          # Check changes
          if git diff --staged --quiet; then
            echo "Koi nayi file extract nahi hui."
          else
            git commit -m "Auto-detected and extracted zip files"
            git push origin main
          fi
