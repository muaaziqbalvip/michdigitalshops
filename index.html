    /* ══════════════════════════════════════════════════════════════
   MICH Digital Shop — Complete Stylesheet
   Dark Luxury · Neon Glow · Glassmorphism · Mobile First
   ══════════════════════════════════════════════════════════════ */

/* ── Variables ─────────────────────────────────────────────── */
:root {
  --bg:          #050508;
  --bg2:         #0a0a12;
  --bg3:         #0d0d1a;
  --bg4:         #12122a;
  --blue:        #00d4ff;
  --blue-dim:    rgba(0,212,255,0.15);
  --purple:      #8b5cf6;
  --purple-dim:  rgba(139,92,246,0.15);
  --orange:      #f97316;
  --orange-dim:  rgba(249,115,22,0.15);
  --green:       #10b981;
  --green-dim:   rgba(16,185,129,0.15);
  --yellow:      #fbbf24;
  --pink:        #ec4899;
  --red:         #ef4444;
  --glass:       rgba(255,255,255,0.05);
  --glass2:      rgba(255,255,255,0.08);
  --border:      rgba(255,255,255,0.10);
  --border2:     rgba(255,255,255,0.06);
  --text:        #ffffff;
  --text2:       rgba(255,255,255,0.70);
  --text3:       rgba(255,255,255,0.45);
  --text4:       rgba(255,255,255,0.25);
  --shadow:      0 8px 32px rgba(0,0,0,0.5);
  --radius:      14px;
  --radius-lg:   20px;
  --radius-xl:   28px;
  --transition:  0.25s cubic-bezier(0.4,0,0.2,1);
}

/* ── Reset ──────────────────────────────────────────────────── */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; font-size:16px; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}
a { text-decoration:none; color:inherit; cursor:pointer; }
button { cursor:pointer; font-family:inherit; border:none; background:none; }
input,textarea,select { font-family:inherit; outline:none; }
img { max-width:100%; display:block; }
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:var(--bg2); }
::-webkit-scrollbar-thumb { background:rgba(0,212,255,0.35); border-radius:2px; }
::selection { background:rgba(139,92,246,0.35); color:#fff; }

/* ── Splash ─────────────────────────────────────────────────── */
#splash {
  position:fixed; inset:0; z-index:9999;
  background:var(--bg);
  display:flex; align-items:center; justify-content:center;
  transition: opacity 0.5s, visibility 0.5s;
}
#splash.hide { opacity:0; visibility:hidden; pointer-events:none; }
.splash-inner { text-align:center; }
.splash-logo { width:90px; height:90px; object-fit:contain; margin:0 auto 16px; animation:float 3s ease-in-out infinite; }
.splash-title { font-size:1.6rem; font-weight:800; background:linear-gradient(135deg,var(--blue),var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:24px; }
.splash-loader { display:flex; gap:8px; justify-content:center; }
.splash-loader span { width:8px; height:8px; border-radius:50%; background:var(--blue); animation:bounce 1.2s ease-in-out infinite; }
.splash-loader span:nth-child(2) { background:var(--purple); animation-delay:0.2s; }
.splash-loader span:nth-child(3) { background:var(--orange); animation-delay:0.4s; }

/* ── Utility Classes ─────────────────────────────────────────── */
.hidden { display:none !important; }
.desktop-only { display:flex; }
.mobile-only { display:none; }
@media(max-width:768px) {
  .desktop-only { display:none !important; }
  .mobile-only  { display:flex !important; }
}
.gradient-text {
  background:linear-gradient(135deg,var(--blue),var(--purple));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.gradient-text-2 {
  background:linear-gradient(135deg,var(--purple),var(--orange));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.glass {
  background:var(--glass);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,0.06);
}
.glass-dark {
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(20px);
  border:1px solid var(--border2);
  border-radius:var(--radius);
}
.scroll-x { overflow-x:auto; scrollbar-width:none; }
.scroll-x::-webkit-scrollbar { display:none; }
.page { padding:20px 16px 100px; max-width:1200px; margin:0 auto; }
@media(min-width:768px) { .page { padding:28px 24px 40px; } }

/* ── Buttons ─────────────────────────────────────────────────── */
.btn-neon {
  display:inline-flex; align-items:center; gap:6px;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  color:#fff; font-weight:600; font-size:0.875rem;
  padding:10px 20px; border-radius:var(--radius);
  transition:var(--transition); cursor:pointer; border:none;
  white-space:nowrap;
}
.btn-neon:hover { box-shadow:0 0 25px rgba(0,212,255,0.4),0 0 50px rgba(139,92,246,0.2); transform:translateY(-2px); }
.btn-neon:active { transform:scale(0.97); }
.btn-neon.sm { padding:7px 14px; font-size:0.8rem; }
.btn-neon.lg { padding:14px 28px; font-size:1rem; }
.btn-outline {
  display:inline-flex; align-items:center; gap:6px;
  background:transparent;
  border:1px solid rgba(0,212,255,0.5);
  color:var(--blue); font-weight:600; font-size:0.875rem;
  padding:10px 20px; border-radius:var(--radius);
  transition:var(--transition); cursor:pointer;
  white-space:nowrap;
}
.btn-outline:hover { background:rgba(0,212,255,0.1); box-shadow:0 0 18px rgba(0,212,255,0.25); }
.btn-outline.sm { padding:7px 14px; font-size:0.8rem; }
.btn-red { background:rgba(239,68,68,0.2); border:1px solid rgba(239,68,68,0.4); color:#ef4444; }
.btn-red:hover { background:rgba(239,68,68,0.3); }
.btn-green { background:rgba(16,185,129,0.2); border:1px solid rgba(16,185,129,0.4); color:var(--green); }
.btn-green:hover { background:rgba(16,185,129,0.3); }
.btn-wa { background:#25d366; color:#fff; font-weight:600; font-size:0.875rem; padding:10px 16px; border-radius:var(--radius); transition:var(--transition); }
.btn-wa:hover { background:#22c55e; transform:translateY(-1px); }
.btn-block { width:100%; justify-content:center; }

/* ── Inputs ──────────────────────────────────────────────────── */
.input {
  width:100%; background:var(--glass);
  border:1px solid var(--border);
  border-radius:var(--radius); color:var(--text);
  padding:12px 16px; font-size:0.9rem; transition:var(--transition);
}
.input:focus { border-color:rgba(0,212,255,0.6); box-shadow:0 0 12px rgba(0,212,255,0.15); }
.input::placeholder { color:var(--text4); }
.input-wrap { position:relative; }
.input-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:1rem; pointer-events:none; }
.input-wrap .input { padding-left:40px; }
textarea.input { resize:vertical; min-height:80px; }
select.input { background:var(--bg2); cursor:pointer; }
.form-group { margin-bottom:14px; }
.form-label { font-size:0.8rem; color:var(--text3); display:block; margin-bottom:6px; font-weight:500; }

/* ── Badges ──────────────────────────────────────────────────── */
.badge {
  display:inline-flex; align-items:center; gap:4px;
  font-size:0.72rem; font-weight:700; padding:3px 10px;
  border-radius:50px; text-transform:capitalize;
}
.badge-pending    { background:rgba(251,191,36,0.15);  color:var(--yellow); border:1px solid rgba(251,191,36,0.3);  }
.badge-approved   { background:var(--green-dim);        color:var(--green);  border:1px solid rgba(16,185,129,0.3);  }
.badge-processing { background:var(--blue-dim);         color:var(--blue);   border:1px solid rgba(0,212,255,0.3);   }
.badge-shipped    { background:var(--purple-dim);       color:var(--purple); border:1px solid rgba(139,92,246,0.3);  }
.badge-delivered  { background:var(--green-dim);        color:var(--green);  border:1px solid rgba(16,185,129,0.3);  }
.badge-cancelled  { background:rgba(239,68,68,0.15);    color:var(--red);    border:1px solid rgba(239,68,68,0.3);   }
.badge-paid       { background:var(--green-dim);        color:var(--green);  border:1px solid rgba(16,185,129,0.3);  }
.badge-rejected   { background:rgba(239,68,68,0.15);    color:var(--red);    border:1px solid rgba(239,68,68,0.3);   }
.badge-physical   { background:var(--blue-dim);   color:var(--blue);   }
.badge-digital    { background:var(--purple-dim); color:var(--purple); }

/* ── Navbar ──────────────────────────────────────────────────── */
.navbar {
  position:sticky; top:0; z-index:100;
  background:rgba(5,5,8,0.92);
  backdrop-filter:blur(30px); -webkit-backdrop-filter:blur(30px);
  border-bottom:1px solid var(--border2);
}
.navbar-inner {
  max-width:1200px; margin:0 auto; padding:0 16px;
  height:60px; display:flex; align-items:center; gap:16px;
}
.nav-logo { display:flex; align-items:center; gap:8px; flex-shrink:0; }
.nav-logo img { width:34px; height:34px; object-fit:contain; }
.nav-logo span { font-weight:800; font-size:1rem; }
.nav-links { display:flex; align-items:center; gap:4px; }
.nav-link {
  padding:7px 12px; border-radius:10px; font-size:0.85rem; font-weight:500;
  color:var(--text3); transition:var(--transition); cursor:pointer;
}
.nav-link:hover { color:var(--text); background:var(--glass); }
.nav-link.active { color:var(--blue); background:rgba(0,212,255,0.1); }
.admin-link { color:var(--purple) !important; }
.nav-search { flex:1; max-width:280px; position:relative; }
.nav-search input { width:100%; background:var(--glass); border:1px solid var(--border); border-radius:10px; color:var(--text); padding:8px 12px 8px 36px; font-size:0.85rem; }
.nav-search input:focus { border-color:rgba(0,212,255,0.4); }
.nav-search input::placeholder { color:var(--text4); }
.search-icon { position:absolute; left:11px; top:50%; transform:translateY(-50%); font-size:0.85rem; }
.nav-right { margin-left:auto; display:flex; align-items:center; gap:8px; }
#nav-user-area { display:flex; align-items:center; gap:8px; }
.nav-avatar { width:34px; height:34px; border-radius:50%; object-fit:cover; border:2px solid rgba(0,212,255,0.4); cursor:pointer; }
.nav-avatar-placeholder {
  width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg,var(--blue),var(--purple)); font-weight:700; font-size:0.85rem; cursor:pointer;
}
.menu-btn { font-size:1.4rem; color:var(--text2); padding:6px; border-radius:8px; }
.menu-btn:hover { background:var(--glass); }
.mobile-menu {
  background:rgba(5,5,8,0.98); border-top:1px solid var(--border2);
  padding:12px 16px 16px;
}
.mobile-search { width:100%; margin-bottom:10px; background:var(--glass); border:1px solid var(--border); border-radius:10px; color:var(--text); padding:10px 14px; font-size:0.9rem; }
.mobile-nav-link { display:block; padding:12px 16px; border-radius:10px; font-size:0.9rem; color:var(--text2); transition:var(--transition); cursor:pointer; }
.mobile-nav-link:hover { background:var(--glass); color:var(--text); }
.logout-link { color:var(--red) !important; margin-top:8px; }

/* ── Bottom Nav ──────────────────────────────────────────────── */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0; z-index:100;
  background:rgba(5,5,8,0.96);
  backdrop-filter:blur(30px); -webkit-backdrop-filter:blur(30px);
  border-top:1px solid var(--border2);
  display:flex; padding:8px 0; padding-bottom:calc(8px + env(safe-area-inset-bottom));
}
@media(min-width:768px) { .bottom-nav { display:none !important; } }
.bnav-item {
  flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
  padding:6px 4px; border-radius:12px; transition:var(--transition);
  color:var(--text3);
}
.bnav-item.active { color:var(--blue); }
.bnav-item.active .bnav-icon { filter:drop-shadow(0 0 6px rgba(0,212,255,0.7)); }
.bnav-icon { font-size:1.3rem; line-height:1; }
.bnav-label { font-size:0.62rem; font-weight:500; }

/* ── Toast ───────────────────────────────────────────────────── */
#toast-container { position:fixed; top:72px; left:50%; transform:translateX(-50%); z-index:9000; display:flex; flex-direction:column; gap:8px; pointer-events:none; min-width:260px; max-width:90vw; }
.toast {
  background:rgba(13,13,26,0.96); backdrop-filter:blur(20px);
  border:1px solid var(--border); border-radius:12px;
  padding:12px 18px; font-size:0.875rem; font-weight:500;
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
  animation:slide-down 0.3s ease;
  display:flex; align-items:center; gap:10px; pointer-events:auto;
}
.toast.success { border-color:rgba(16,185,129,0.4); }
.toast.error   { border-color:rgba(239,68,68,0.4); }
.toast.info    { border-color:rgba(0,212,255,0.4); }
.toast.hide    { animation:fade-out 0.3s ease forwards; }

/* ── Modal ───────────────────────────────────────────────────── */
.modal-overlay {
  position:fixed; inset:0; z-index:500;
  background:rgba(0,0,0,0.75); backdrop-filter:blur(10px);
  display:flex; align-items:flex-end; justify-content:center; padding:16px;
  animation:fade-in 0.2s ease;
}
@media(min-width:600px) { .modal-overlay { align-items:center; } }
.modal-box {
  background:rgba(13,13,26,0.98); backdrop-filter:blur(30px);
  border:1px solid var(--border); border-radius:var(--radius-lg);
  width:100%; max-width:480px; max-height:90vh; overflow-y:auto;
  animation:slide-up 0.3s ease;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}
.modal-header { display:flex; align-items:center; justify-content:space-between; padding:18px 20px 14px; border-bottom:1px solid var(--border2); }
.modal-header h3 { font-weight:700; font-size:1.05rem; }
.modal-close { font-size:1.2rem; color:var(--text3); padding:4px 8px; border-radius:8px; transition:var(--transition); }
.modal-close:hover { background:var(--glass); color:var(--text); }
.modal-body { padding:20px; }

/* ── Cards ───────────────────────────────────────────────────── */
.card { background:var(--glass); backdrop-filter:blur(20px); border:1px solid var(--border); border-radius:var(--radius); padding:18px; transition:var(--transition); }
.card:hover { border-color:rgba(255,255,255,0.15); }
.card-dark { background:rgba(0,0,0,0.25); border:1px solid var(--border2); border-radius:var(--radius); padding:14px; }

/* ── Stat Card ───────────────────────────────────────────────── */
.stat-card { padding:16px; display:flex; flex-direction:column; gap:10px; }
.stat-icon { width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.2rem; }
.stat-value { font-size:1.5rem; font-weight:800; line-height:1; }
.stat-label { font-size:0.75rem; color:var(--text3); font-weight:500; }

/* ── Product Card ────────────────────────────────────────────── */
.product-card {
  background:var(--glass); backdrop-filter:blur(20px);
  border:1px solid var(--border); border-radius:var(--radius);
  overflow:hidden; cursor:pointer; transition:var(--transition);
  display:flex; flex-direction:column;
}
.product-card:hover { transform:translateY(-5px); border-color:rgba(0,212,255,0.3); box-shadow:0 12px 40px rgba(0,0,0,0.5),0 0 20px rgba(0,212,255,0.08); }
.product-img { position:relative; aspect-ratio:1; overflow:hidden; background:var(--bg3); }
.product-img img { width:100%; height:100%; object-fit:cover; transition:transform 0.5s ease; }
.product-card:hover .product-img img { transform:scale(1.07); }
.product-img-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:3rem; }
.product-badges { position:absolute; top:8px; left:8px; display:flex; flex-direction:column; gap:4px; }
.product-badge { font-size:0.68rem; font-weight:700; padding:3px 8px; border-radius:50px; }
.product-actions { position:absolute; top:8px; right:8px; display:flex; flex-direction:column; gap:4px; opacity:0; transition:var(--transition); }
.product-card:hover .product-actions { opacity:1; }
.product-action-btn { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:0.85rem; background:rgba(0,0,0,0.6); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,0.1); color:#fff; transition:var(--transition); }
.product-action-btn:hover { background:rgba(0,0,0,0.8); transform:scale(1.1); }
.product-body { padding:12px; flex:1; display:flex; flex-direction:column; gap:6px; }
.product-cat { font-size:0.7rem; color:var(--text4); }
.product-title { font-size:0.875rem; font-weight:600; color:var(--text2); line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.product-pricing { display:flex; align-items:flex-end; justify-content:space-between; margin-top:auto; }
.product-price { font-size:1.1rem; font-weight:800; color:var(--blue); }
.product-old-price { font-size:0.75rem; color:var(--text4); text-decoration:line-through; }
.product-profit { font-size:0.75rem; font-weight:700; color:var(--green); }
.product-order-btn { margin-top:8px; width:100%; background:linear-gradient(135deg,var(--blue),var(--purple)); color:#fff; font-weight:600; font-size:0.8rem; padding:8px; border-radius:10px; transition:var(--transition); }
.product-order-btn:hover { box-shadow:0 0 20px rgba(0,212,255,0.35); }

/* ── Products Grid ───────────────────────────────────────────── */
.products-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
@media(min-width:500px)  { .products-grid { grid-template-columns:repeat(3,1fr); } }
@media(min-width:768px)  { .products-grid { grid-template-columns:repeat(3,1fr); gap:16px; } }
@media(min-width:1024px) { .products-grid { grid-template-columns:repeat(4,1fr); } }

/* ── Stats Grid ──────────────────────────────────────────────── */
.stats-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
@media(min-width:600px)  { .stats-grid { grid-template-columns:repeat(4,1fr); } }

/* ── Section ─────────────────────────────────────────────────── */
.section { margin-bottom:32px; }
.section-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.section-title { font-size:1.2rem; font-weight:800; }
.section-subtitle { font-size:0.8rem; color:var(--text3); margin-top:2px; }
.section-link { font-size:0.85rem; color:var(--blue); font-weight:500; }
.section-link:hover { text-decoration:underline; }

/* ── Hero ────────────────────────────────────────────────────── */
.hero {
  position:relative; overflow:hidden;
  padding:40px 16px 48px; text-align:center;
}
.hero-orb { position:absolute; border-radius:50%; filter:blur(80px); pointer-events:none; }
.hero-orb-1 { width:400px; height:400px; top:-100px; left:-100px; background:radial-gradient(circle,rgba(0,212,255,0.2),transparent); animation:float 8s ease-in-out infinite; }
.hero-orb-2 { width:300px; height:300px; top:50px; right:-80px; background:radial-gradient(circle,rgba(139,92,246,0.18),transparent); animation:float 10s ease-in-out infinite reverse; }
.hero-orb-3 { width:250px; height:250px; bottom:-50px; left:30%; background:radial-gradient(circle,rgba(249,115,22,0.12),transparent); animation:float 12s ease-in-out infinite; }
.hero-content { position:relative; max-width:700px; margin:0 auto; }
.hero-badge { display:inline-flex; align-items:center; gap:8px; background:var(--glass); backdrop-filter:blur(10px); border:1px solid var(--border); border-radius:50px; padding:7px 16px; font-size:0.8rem; color:var(--blue); font-weight:500; margin-bottom:20px; }
.pulse-dot { width:8px; height:8px; background:var(--blue); border-radius:50%; animation:pulse-glow 2s ease-in-out infinite; flex-shrink:0; }
.hero h1 { font-size:clamp(2rem,6vw,3.5rem); font-weight:900; line-height:1.15; margin-bottom:16px; }

.hero-btns { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
.hero-stats { display:flex; gap:28px; justify-content:center; margin-top:32px; }
.hero-stat-val { font-size:1.4rem; font-weight:800; }
.hero-stat-label { font-size:0.72rem; color:var(--text4); }

/* ── Category Chips ──────────────────────────────────────────── */
.cat-scroll { display:flex; gap:10px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none; }
.cat-scroll::-webkit-scrollbar { display:none; }
.cat-chip {
  display:flex; flex-direction:column; align-items:center; gap:5px;
  background:var(--glass); border:1px solid var(--border);
  border-radius:14px; padding:10px 14px; cursor:pointer;
  transition:var(--transition); flex-shrink:0; min-width:70px;
}
.cat-chip:hover, .cat-chip.active { border-color:rgba(0,212,255,0.4); background:rgba(0,212,255,0.08); }
.cat-chip-icon { font-size:1.4rem; }
.cat-chip-label { font-size:0.7rem; color:var(--text3); font-weight:500; }
.cat-chip.active .cat-chip-label { color:var(--blue); }

/* ── Live Counters ───────────────────────────────────────────── */
.counters-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
@media(min-width:600px) { .counters-grid { grid-template-columns:repeat(6,1fr); } }
.counter-card { text-align:center; padding:14px 8px; }
.counter-icon { font-size:1.4rem; margin-bottom:6px; }
.counter-val { font-size:1.15rem; font-weight:800; }
.counter-label { font-size:0.68rem; color:var(--text3); margin-top:2px; }

/* ── Filter Bar ──────────────────────────────────────────────── */
.filter-bar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
.filter-chips { display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; flex:1; }
.filter-chips::-webkit-scrollbar { display:none; }
.filter-chip { padding:6px 14px; border-radius:50px; font-size:0.8rem; font-weight:500; background:var(--glass); border:1px solid var(--border); color:var(--text3); cursor:pointer; transition:var(--transition); white-space:nowrap; flex-shrink:0; }
.filter-chip:hover { color:var(--text); border-color:var(--border); background:var(--glass2); }
.filter-chip.active { background:rgba(0,212,255,0.12); border-color:rgba(0,212,255,0.5); color:var(--blue); }

/* ── Search Bar ──────────────────────────────────────────────── */
.search-bar { position:relative; margin-bottom:16px; }
.search-bar .input { padding-left:44px; padding-right:44px; }
.search-bar .search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:1rem; pointer-events:none; }
.search-clear { position:absolute; right:14px; top:50%; transform:translateY(-50%); font-size:1.1rem; cursor:pointer; color:var(--text4); }
.search-clear:hover { color:var(--text2); }

/* ── Order Card ──────────────────────────────────────────────── */
.order-card { padding:14px 16px; cursor:pointer; transition:var(--transition); border-bottom:1px solid var(--border2); }
.order-card:last-child { border-bottom:none; }
.order-card:hover { background:var(--glass); border-radius:var(--radius); }
.order-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.order-title { font-weight:600; font-size:0.9rem; }
.order-bottom { display:flex; align-items:center; gap:12px; }
.order-meta { font-size:0.75rem; color:var(--text3); }
.order-price { font-weight:700; color:var(--blue); font-size:0.95rem; margin-left:auto; }
.order-profit { font-size:0.75rem; color:var(--green); font-weight:600; }

/* ── Tabs ────────────────────────────────────────────────────── */
.tabs { display:flex; gap:4px; margin-bottom:20px; background:rgba(255,255,255,0.03); border-radius:12px; padding:4px; }
.tab-btn { flex:1; padding:9px; border-radius:9px; font-size:0.82rem; font-weight:600; color:var(--text3); transition:var(--transition); text-align:center; cursor:pointer; }
.tab-btn.active { background:rgba(0,212,255,0.12); border:1px solid rgba(0,212,255,0.3); color:var(--blue); }
.tab-btn:not(.active):hover { color:var(--text2); }

/* ── Earnings ────────────────────────────────────────────────── */
.balance-card {
  padding:24px; text-align:center;
  background:linear-gradient(135deg,rgba(0,212,255,0.1),rgba(139,92,246,0.1));
  border:1px solid rgba(0,212,255,0.2); border-radius:var(--radius-lg);
  margin-bottom:20px;
}
.balance-label { font-size:0.85rem; color:var(--text3); margin-bottom:8px; }
.balance-amount { font-size:2.5rem; font-weight:900; color:var(--blue); margin-bottom:16px; }
.balance-sub { display:flex; gap:24px; justify-content:center; }
.balance-sub-item { text-align:center; }
.balance-sub-val { font-weight:700; font-size:1rem; }
.balance-sub-label { font-size:0.72rem; color:var(--text4); }

/* ── Profile ─────────────────────────────────────────────────── */
.profile-header { text-align:center; padding:28px 20px; }
.profile-avatar { width:80px; height:80px; border-radius:50%; object-fit:cover; margin:0 auto 12px; border:3px solid rgba(0,212,255,0.5); }
.profile-avatar-ph { width:80px; height:80px; border-radius:50%; margin:0 auto 12px; background:linear-gradient(135deg,var(--blue),var(--purple)); display:flex; align-items:center; justify-content:center; font-size:2rem; font-weight:700; }
.profile-name { font-size:1.3rem; font-weight:800; margin-bottom:4px; }
.profile-role { display:inline-flex; padding:4px 14px; border-radius:50px; font-size:0.78rem; font-weight:600; text-transform:capitalize; }
.role-admin    { background:rgba(249,115,22,0.15); color:var(--orange); border:1px solid rgba(249,115,22,0.3); }
.role-reseller { background:var(--blue-dim);        color:var(--blue);   border:1px solid rgba(0,212,255,0.3);  }
.role-marketer { background:var(--purple-dim);       color:var(--purple); border:1px solid rgba(139,92,246,0.3); }
.role-customer { background:var(--green-dim);        color:var(--green);  border:1px solid rgba(16,185,129,0.3); }

/* ── Referral Box ────────────────────────────────────────────── */
.referral-box { background:linear-gradient(135deg,rgba(0,212,255,0.08),rgba(139,92,246,0.08)); border:1px solid rgba(0,212,255,0.2); border-radius:var(--radius); padding:16px; margin-bottom:16px; }
.referral-code { font-size:1.2rem; font-weight:800; letter-spacing:3px; color:var(--blue); text-align:center; margin:10px 0; }
.referral-btn { font-size:0.8rem; padding:8px 16px; }

/* ── Admin ───────────────────────────────────────────────────── */
.admin-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:24px; }
@media(min-width:600px) { .admin-grid { grid-template-columns:repeat(4,1fr); } }
.admin-stat { text-align:center; padding:16px 10px; }
.admin-stat-icon { font-size:1.6rem; margin-bottom:8px; }
.admin-stat-val { font-size:1.4rem; font-weight:800; }
.admin-stat-label { font-size:0.72rem; color:var(--text3); }
.list-item { display:flex; align-items:center; gap:12px; padding:12px 14px; border-bottom:1px solid var(--border2); cursor:pointer; transition:var(--transition); }
.list-item:last-child { border-bottom:none; }
.list-item:hover { background:var(--glass); border-radius:var(--radius); }
.list-avatar { width:40px; height:40px; border-radius:12px; background:linear-gradient(135deg,var(--blue),var(--purple)); display:flex; align-items:center; justify-content:center; font-weight:700; flex-shrink:0; }
.list-info { flex:1; min-width:0; }
.list-name { font-weight:600; font-size:0.88rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.list-sub { font-size:0.75rem; color:var(--text3); }
.list-right { text-align:right; flex-shrink:0; }

/* ── Share Page ──────────────────────────────────────────────── */
.share-page { min-height:100vh; background:var(--bg); }
.share-hero { position:relative; padding:60px 20px 40px; text-align:center; }
.share-img { width:200px; height:200px; object-fit:cover; border-radius:var(--radius-xl); margin:0 auto 24px; box-shadow:0 20px 60px rgba(0,0,0,0.5); }
.share-price { font-size:2.2rem; font-weight:900; color:var(--blue); margin:8px 0; }

/* ── Catalog Detail ──────────────────────────────────────────── */
.detail-grid { display:grid; gap:24px; }
@media(min-width:768px) { .detail-grid { grid-template-columns:1fr 1fr; } }
.img-gallery { display:flex; flex-direction:column; gap:8px; }
.img-main { aspect-ratio:1; border-radius:var(--radius-lg); overflow:hidden; background:var(--bg3); }
.img-main img { width:100%; height:100%; object-fit:cover; }
.img-thumbs { display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; }
.img-thumbs::-webkit-scrollbar { display:none; }
.img-thumb { width:60px; height:60px; border-radius:10px; overflow:hidden; cursor:pointer; border:2px solid transparent; flex-shrink:0; }
.img-thumb.active { border-color:var(--blue); }
.img-thumb img { width:100%; height:100%; object-fit:cover; }

/* ── Empty State ─────────────────────────────────────────────── */
.empty { text-align:center; padding:60px 20px; }
.empty-icon { font-size:4rem; margin-bottom:12px; }
.empty-title { font-size:1.2rem; font-weight:700; color:var(--text2); margin-bottom:6px; }
.empty-text { font-size:0.88rem; color:var(--text3); margin-bottom:20px; }

/* ── Loading / Skeleton ──────────────────────────────────────── */
.skeleton { background:linear-gradient(90deg,rgba(255,255,255,0.04) 0%,rgba(255,255,255,0.08) 50%,rgba(255,255,255,0.04) 100%); background-size:200% 100%; animation:shimmer 1.8s linear infinite; border-radius:8px; }

/* ── Auth Page ───────────────────────────────────────────────── */
.auth-page { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
.auth-card { width:100%; max-width:420px; }
.auth-logo { text-align:center; margin-bottom:28px; }
.auth-logo img { width:70px; height:70px; object-fit:contain; margin:0 auto 12px; animation:float 4s ease-in-out infinite; }
.auth-logo h1 { font-size:1.5rem; font-weight:900; }
.auth-logo p { font-size:0.85rem; color:var(--text3); margin-top:4px; }
.google-btn { width:100%; display:flex; align-items:center; justify-content:center; gap:10px; background:var(--glass); border:1px solid var(--border); border-radius:var(--radius); padding:12px; font-weight:600; font-size:0.9rem; transition:var(--transition); margin-bottom:16px; }
.google-btn:hover { background:var(--glass2); border-color:rgba(255,255,255,0.2); }
.google-icon { width:20px; height:20px; }
.divider { display:flex; align-items:center; gap:12px; margin:16px 0; }
.divider-line { flex:1; height:1px; background:var(--border); }
.divider-text { font-size:0.78rem; color:var(--text4); }
.role-cards { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
.role-card { padding:12px 8px; text-align:center; border:1px solid var(--border); border-radius:12px; cursor:pointer; transition:var(--transition); }
.role-card.active { border-color:rgba(0,212,255,0.6); background:rgba(0,212,255,0.08); }
.role-card:hover { border-color:rgba(255,255,255,0.2); }
.role-card-icon { font-size:1.5rem; margin-bottom:4px; }
.role-card-label { font-size:0.72rem; font-weight:600; color:var(--text3); }
.role-card.active .role-card-label { color:var(--blue); }

/* ── Animations ──────────────────────────────────────────────── */
@keyframes float {
  0%,100% { transform:translateY(0); }
  50%      { transform:translateY(-12px); }
}
@keyframes bounce {
  0%,100% { transform:translateY(0); }
  50%      { transform:translateY(-8px); }
}
@keyframes shimmer {
  0%   { background-position:-200% 0; }
  100% { background-position:200% 0; }
}
@keyframes pulse-glow {
  0%,100% { box-shadow:0 0 4px 2px rgba(0,212,255,0.6); }
  50%      { box-shadow:0 0 10px 4px rgba(0,212,255,0.9); }
}
@keyframes slide-down {
  from { transform:translateY(-20px); opacity:0; }
  to   { transform:translateY(0);     opacity:1; }
}
@keyframes slide-up {
  from { transform:translateY(40px); opacity:0; }
  to   { transform:translateY(0);    opacity:1; }
}
@keyframes fade-in {
  from { opacity:0; }
  to   { opacity:1; }
}
@keyframes fade-out {
  from { opacity:1; transform:translateY(0); }
  to   { opacity:0; transform:translateY(-10px); }
}
@keyframes count-up {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}

   IMGBB UPLOADER COMPONENTS

/* ── Multi-image uploader ── */
.imgbb-uploader { width:100%; }

.imgbb-preview {
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  padding:10px;
  background:var(--bg2);
  border:1px dashed rgba(0,212,255,0.25);
  border-radius:14px;
  min-height:80px;
  align-items:flex-start;
}

.imgbb-thumb-wrap {
  position:relative;
  width:80px;
  height:80px;
  border-radius:10px;
  overflow:hidden;
  flex-shrink:0;
  border:2px solid rgba(0,212,255,0.2);
}

.imgbb-thumb {
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.imgbb-remove {
  position:absolute;
  top:3px;
  right:3px;
  width:20px;
  height:20px;
  border-radius:50%;
  background:rgba(239,68,68,0.85);
  border:none;
  color:white;
  font-size:0.65rem;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  line-height:1;
  padding:0;
}

.imgbb-add {
  width:80px;
  height:80px;
  border-radius:10px;
  border:2px dashed rgba(0,212,255,0.35);
  background:var(--bg3);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  cursor:pointer;
  transition:border-color 0.2s, background 0.2s;
  flex-shrink:0;
}

.imgbb-add:hover {
  border-color:var(--blue);
  background:var(--blue-dim);
}

.imgbb-add.uploading {
  cursor:wait;
  opacity:0.7;
}

/* ── Spinner ── */
.imgbb-spinner {
  display:inline-block;
  width:20px;
  height:20px;
  border:3px solid rgba(0,212,255,0.25);
  border-top-color:var(--blue);
  border-radius:50%;
  animation:spin 0.7s linear infinite;
}

@keyframes spin {
  to { transform:rotate(360deg); }
}

/* ── Profile photo uploader ── */
.profile-photo-uploader {
  display:flex;
  flex-direction:column;
  align-items:center;
}

.profile-photo-wrap {
  position:relative;
  width:90px;
  height:90px;
}

.profile-photo-preview {
  width:90px;
  height:90px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid rgba(0,212,255,0.4);
  display:block;
}

.profile-photo-placeholder {
  width:90px;
  height:90px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:2rem;
  font-weight:800;
  color:white;
  border:3px solid rgba(0,212,255,0.4);
}

.profile-photo-btn {
  position:absolute;
  bottom:0;
  right:0;
  width:30px;
  height:30px;
  border-radius:50%;
  background:var(--blue);
  border:2px solid var(--bg);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:0.85rem;
  transition:background 0.2s, transform 0.2s;
}

.profile-photo-btn:hover {
  background:var(--purple);
  transform:scale(1.1);
}

.profile-photo-btn.uploading {
  cursor:wait;
  background:var(--bg3);
}
